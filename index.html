<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spese Tirocinio</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%236366f1'/><text x='50' y='68' font-size='60' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'>$</text></svg>">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Spese">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%236366f1'/><text x='50' y='68' font-size='60' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'>$</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #1e293b; min-height: 100vh; }
  
  .header { background: linear-gradient(135deg, #6366f1, #8b5cf6); padding: 20px 24px; color: #fff; display: flex; align-items: center; gap: 12px; }
  .header-icon { width: 40px; height: 40px; background: rgba(255,255,255,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header p { font-size: 13px; opacity: 0.85; margin-top: 2px; }
  
  .container { max-width: 800px; margin: 0 auto; padding: 16px; }
  
  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  .year-nav { display: flex; align-items: center; gap: 6px; background: #fff; padding: 6px 12px; border-radius: 10px; border: 1px solid #e2e8f0; }
  .year-nav button { background: none; border: none; font-size: 18px; cursor: pointer; color: #6366f1; padding: 2px 6px; }
  .year-nav span { font-weight: 700; font-size: 16px; min-width: 50px; text-align: center; }
  
  .months { display: flex; gap: 4px; flex-wrap: wrap; }
  .month-btn { padding: 5px 10px; border-radius: 8px; border: none; font-size: 12px; cursor: pointer; background: #e2e8f0; color: #475569; transition: all 0.2s; }
  .month-btn.active { background: #6366f1; color: #fff; font-weight: 700; }
  .month-btn:hover:not(.active) { background: #cbd5e1; }
  
  .pay-row { display: flex; align-items: center; gap: 8px; background: #fff; padding: 8px 14px; border-radius: 10px; border: 1px solid #e2e8f0; }
  .pay-row label { font-size: 13px; color: #64748b; }
  .pay-row input { width: 80px; border: 1px solid #cbd5e1; border-radius: 6px; padding: 4px 8px; font-size: 14px; text-align: right; }
  
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .card { border-radius: 12px; padding: 16px; text-align: center; }
  .card .label { font-size: 12px; color: #64748b; margin-bottom: 4px; }
  .card .value { font-size: 20px; font-weight: 700; }
  
  .section { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid #e2e8f0; }
  .section h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  
  .cat-row { margin-bottom: 8px; }
  .cat-row .cat-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 3px; }
  .cat-row .cat-bar-bg { height: 6px; background: #f1f5f9; border-radius: 3px; }
  .cat-row .cat-bar { height: 6px; border-radius: 3px; transition: width 0.3s; }
  
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-grid input, .form-grid select { padding: 8px 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 13px; }
  .form-grid select { background: #fff; }
  
  .btn-row { display: flex; gap: 8px; margin-top: 10px; }
  .btn-primary { flex: 1; padding: 10px; border-radius: 10px; border: none; color: #fff; font-weight: 600; font-size: 14px; cursor: pointer; }
  .btn-cancel { padding: 10px 16px; border-radius: 10px; border: 1px solid #cbd5e1; background: #fff; cursor: pointer; font-size: 14px; }
  
  .entry { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f5f9; gap: 10px; }
  .entry:last-child { border-bottom: none; }
  .entry .dot { width: 8px; height: 8px; border-radius: 4px; flex-shrink: 0; }
  .entry .info { flex: 1; min-width: 0; }
  .entry .info .title { font-size: 13px; font-weight: 500; }
  .entry .info .meta { font-size: 11px; color: #94a3b8; }
  .entry .amount { font-weight: 600; font-size: 14px; color: #ef4444; white-space: nowrap; }
  .entry button { background: none; border: none; cursor: pointer; font-size: 15px; padding: 4px; }
  
  .empty { color: #94a3b8; font-size: 13px; text-align: center; padding: 24px; }
  
  .annual-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .annual-card { background: #f8fafc; border-radius: 8px; padding: 10px; text-align: center; border: 1px solid #e2e8f0; cursor: pointer; transition: all 0.2s; }
  .annual-card:hover { border-color: #6366f1; }
  .annual-card .am { font-size: 11px; color: #64748b; }
  .annual-card .av { font-size: 14px; font-weight: 600; margin-top: 2px; }
  
  .export-btn { display: inline-block; padding: 8px 16px; background: #10b981; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 12px; }
  .export-btn:hover { background: #059669; }

  .status-bar { padding: 6px 12px; font-size: 11px; color: #10b981; text-align: center; background: #ecfdf5; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">$</div>
  <div>
    <h1>Spese Tirocinio</h1>
    <p>Traccia le spese lavorative e calcola il guadagno netto</p>
  </div>
</div>
<div class="status-bar" id="statusBar">✅ Dati salvati automaticamente</div>

<div class="container">
  <div class="controls">
    <div class="year-nav">
      <button onclick="changeYear(-1)">‹</button>
      <span id="yearLabel"></span>
      <button onclick="changeYear(1)">›</button>
    </div>
    <div class="pay-row">
      <label>Retribuzione:</label>
      <input type="number" id="payInput" onchange="updatePay(this.value)">
      <label>€/mese</label>
    </div>
  </div>
  
  <div class="months" id="monthsBar"></div>
  <div style="height:12px"></div>

  <div class="cards">
    <div class="card" style="background:#eef2ff"><div class="label">Retribuzione</div><div class="value" id="cardPay" style="color:#6366f1"></div></div>
    <div class="card" style="background:#fef2f2"><div class="label">Totale spese</div><div class="value" id="cardExp" style="color:#ef4444"></div></div>
    <div class="card" id="cardNetWrap"><div class="label">Guadagno netto</div><div class="value" id="cardNet"></div></div>
  </div>

  <div class="section" id="catSection" style="display:none">
    <h3>Spese per categoria</h3>
    <div id="catBars"></div>
  </div>

  <div class="section">
    <h3 id="formTitle">➕ Nuova spesa</h3>
    <div class="form-grid">
      <input type="date" id="fDate">
      <select id="fCat"></select>
      <input type="text" id="fDesc" placeholder="Descrizione">
      <input type="number" id="fAmt" step="0.01" placeholder="Importo €">
    </div>
    <div class="btn-row">
      <button class="btn-primary" id="formBtn" style="background:#6366f1" onclick="submitForm()">Aggiungi spesa</button>
      <button class="btn-cancel" id="cancelBtn" style="display:none" onclick="cancelEdit()">Annulla</button>
    </div>
  </div>

  <div class="section">
    <h3 id="entriesTitle">📋 Movimenti</h3>
    <div id="entriesList"></div>
  </div>

  <div class="section">
    <h3>📊 Riepilogo annuale <span id="annualYear"></span></h3>
    <div class="cards" style="margin-bottom:12px">
      <div class="card" style="background:#eef2ff"><div class="label">Entrate annuali</div><div class="value" id="annIncome" style="color:#6366f1"></div></div>
      <div class="card" style="background:#fef2f2"><div class="label">Spese annuali</div><div class="value" id="annExp" style="color:#ef4444"></div></div>
      <div class="card" id="annNetWrap"><div class="label">Netto annuale</div><div class="value" id="annNet"></div></div>
    </div>
    <div class="annual-grid" id="annualGrid"></div>
    <button class="export-btn" onclick="exportCSV()">📥 Esporta CSV</button>
  </div>
</div>

<script>
const CATS = ["Parcheggio","Carburante/Trasporti","Pranzo/Spesa","Materiale lavoro","Abbigliamento lavoro","Altro"];
const MONTHS = ["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];
const CAT_COLORS = {"Parcheggio":"#6366f1","Carburante/Trasporti":"#f59e0b","Pranzo/Spesa":"#10b981","Materiale lavoro":"#ef4444","Abbigliamento lavoro":"#8b5cf6","Altro":"#64748b"};
const fmt = n => n.toFixed(2).replace(".",",") + " €";

let state = loadState();
let editId = null;

function defaultState() {
  return { entries: [], monthlyPay: 800, selectedMonth: new Date().getMonth(), selectedYear: new Date().getFullYear() };
}

function loadState() {
  try {
    const s = localStorage.getItem("tirocinio_tracker");
    if (s) { const p = JSON.parse(s); return { ...defaultState(), ...p }; }
  } catch(e) {}
  return defaultState();
}

function saveState() {
  localStorage.setItem("tirocinio_tracker", JSON.stringify(state));
  document.getElementById("statusBar").textContent = "✅ Salvato — " + new Date().toLocaleTimeString("it-IT");
}

function changeYear(d) { state.selectedYear += d; saveState(); render(); }
function updatePay(v) { state.monthlyPay = Number(v); saveState(); render(); }

function getFiltered() {
  return state.entries.filter(e => {
    const d = new Date(e.date);
    return d.getMonth() === state.selectedMonth && d.getFullYear() === state.selectedYear;
  }).sort((a,b) => b.date.localeCompare(a.date));
}

function getYearEntries() {
  return state.entries.filter(e => new Date(e.date).getFullYear() === state.selectedYear);
}

function submitForm() {
  const date = document.getElementById("fDate").value;
  const cat = document.getElementById("fCat").value;
  const desc = document.getElementById("fDesc").value;
  const amt = parseFloat(document.getElementById("fAmt").value);
  if (!date || !desc || isNaN(amt) || amt <= 0) return alert("Compila tutti i campi");
  
  if (editId !== null) {
    const i = state.entries.findIndex(e => e.id === editId);
    if (i >= 0) state.entries[i] = { ...state.entries[i], date, category: cat, description: desc, amount: amt };
    editId = null;
  } else {
    state.entries.push({ id: Date.now(), date, category: cat, description: desc, amount: amt });
  }
  saveState();
  document.getElementById("fDesc").value = "";
  document.getElementById("fAmt").value = "";
  render();
}

function startEdit(id) {
  const e = state.entries.find(x => x.id === id);
  if (!e) return;
  editId = id;
  document.getElementById("fDate").value = e.date;
  document.getElementById("fCat").value = e.category;
  document.getElementById("fDesc").value = e.description;
  document.getElementById("fAmt").value = e.amount;
  document.getElementById("formTitle").textContent = "✏️ Modifica spesa";
  document.getElementById("formBtn").textContent = "Salva modifiche";
  document.getElementById("formBtn").style.background = "#f59e0b";
  document.getElementById("cancelBtn").style.display = "";
}

function cancelEdit() {
  editId = null;
  document.getElementById("fDesc").value = "";
  document.getElementById("fAmt").value = "";
  document.getElementById("formTitle").textContent = "➕ Nuova spesa";
  document.getElementById("formBtn").textContent = "Aggiungi spesa";
  document.getElementById("formBtn").style.background = "#6366f1";
  document.getElementById("cancelBtn").style.display = "none";
}

function removeEntry(id) {
  if (!confirm("Eliminare questa spesa?")) return;
  state.entries = state.entries.filter(e => e.id !== id);
  if (editId === id) cancelEdit();
  saveState(); render();
}

function selectMonth(m) { state.selectedMonth = m; saveState(); render(); }

function exportCSV() {
  const ye = getYearEntries().sort((a,b) => a.date.localeCompare(b.date));
  let csv = "Data,Categoria,Descrizione,Importo\n";
  ye.forEach(e => { csv += `${e.date},"${e.category}","${e.description}",${e.amount.toFixed(2)}\n`; });
  csv += `\nRetribuzione mensile:,${state.monthlyPay}\n`;
  csv += `Totale spese annuali:,${ye.reduce((s,e)=>s+e.amount,0).toFixed(2)}\n`;
  const blob = new Blob([csv], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `spese_tirocinio_${state.selectedYear}.csv`;
  a.click();
}

function render() {
  document.getElementById("yearLabel").textContent = state.selectedYear;
  document.getElementById("annualYear").textContent = state.selectedYear;
  document.getElementById("payInput").value = state.monthlyPay;

  let mhtml = "";
  MONTHS.forEach((m, i) => {
    mhtml += `<button class="month-btn ${i === state.selectedMonth ? 'active' : ''}" onclick="selectMonth(${i})">${m}</button>`;
  });
  document.getElementById("monthsBar").innerHTML = mhtml;

  if (!document.getElementById("fDate").value) {
    document.getElementById("fDate").value = new Date().toISOString().slice(0,10);
  }

  const sel = document.getElementById("fCat");
  if (sel.options.length === 0) CATS.forEach(c => { const o = document.createElement("option"); o.value = c; o.textContent = c; sel.appendChild(o); });

  const filtered = getFiltered();
  const totalExp = filtered.reduce((s,e) => s + e.amount, 0);
  const net = state.monthlyPay - totalExp;

  document.getElementById("cardPay").textContent = fmt(state.monthlyPay);
  document.getElementById("cardExp").textContent = fmt(totalExp);
  document.getElementById("cardNet").textContent = fmt(net);
  document.getElementById("cardNet").style.color = net >= 0 ? "#10b981" : "#ef4444";
  document.getElementById("cardNetWrap").style.background = net >= 0 ? "#ecfdf5" : "#fef2f2";

  const catMap = {};
  CATS.forEach(c => catMap[c] = 0);
  filtered.forEach(e => catMap[e.category] = (catMap[e.category]||0) + e.amount);
  const catArr = Object.entries(catMap).filter(([,v]) => v > 0).sort((a,b) => b[1]-a[1]);
  const maxCat = catArr.length ? catArr[0][1] : 1;

  if (catArr.length) {
    document.getElementById("catSection").style.display = "";
    let ch = "";
    catArr.forEach(([cat, val]) => {
      ch += `<div class="cat-row"><div class="cat-header"><span>${cat}</span><span style="font-weight:600">${fmt(val)} <span style="color:#94a3b8;font-weight:400">(${((val/totalExp)*100).toFixed(0)}%)</span></span></div><div class="cat-bar-bg"><div class="cat-bar" style="background:${CAT_COLORS[cat]||'#64748b'};width:${(val/maxCat)*100}%"></div></div></div>`;
    });
    document.getElementById("catBars").innerHTML = ch;
  } else {
    document.getElementById("catSection").style.display = "none";
  }

  document.getElementById("entriesTitle").textContent = `📋 Movimenti di ${MONTHS[state.selectedMonth]} ${state.selectedYear} (${filtered.length})`;
  if (filtered.length === 0) {
    document.getElementById("entriesList").innerHTML = '<div class="empty">Nessuna spesa registrata per questo mese</div>';
  } else {
    let eh = "";
    filtered.forEach(e => {
      eh += `<div class="entry"><div class="dot" style="background:${CAT_COLORS[e.category]||'#64748b'}"></div><div class="info"><div class="title">${e.description}</div><div class="meta">${e.category} · ${new Date(e.date).toLocaleDateString("it-IT")}</div></div><div class="amount">-${fmt(e.amount)}</div><button onclick="startEdit(${e.id})">✏️</button><button onclick="removeEntry(${e.id})">🗑️</button></div>`;
    });
    document.getElementById("entriesList").innerHTML = eh;
  }

  const yearEntries = getYearEntries();
  const annTotalExp = yearEntries.reduce((s,e) => s + e.amount, 0);
  const annIncome = state.monthlyPay * 12;
  const annNet = annIncome - annTotalExp;
  document.getElementById("annIncome").textContent = fmt(annIncome);
  document.getElementById("annExp").textContent = fmt(annTotalExp);
  document.getElementById("annNet").textContent = fmt(annNet);
  document.getElementById("annNet").style.color = annNet >= 0 ? "#10b981" : "#ef4444";
  document.getElementById("annNetWrap").style.background = annNet >= 0 ? "#ecfdf5" : "#fef2f2";

  let ag = "";
  MONTHS.forEach((m, i) => {
    const me = yearEntries.filter(e => new Date(e.date).getMonth() === i);
    const mt = me.reduce((s,e) => s + e.amount, 0);
    const mn = state.monthlyPay - mt;
    ag += `<div class="annual-card" onclick="selectMonth(${i})"><div class="am">${m}</div><div class="av" style="color:${mn >= 0 ? '#10b981' : '#ef4444'}">${mt > 0 ? fmt(mn) : '—'}</div></div>`;
  });
  document.getElementById("annualGrid").innerHTML = ag;
}

render();
</script>
</body>
</html>
